name: 'GitOps Infrastructure Deployment'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-ansible:
    name: 'Deploy Infrastructure and Configuration'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'us-east-1'

    steps:
    # 1. Checkout repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup SSH Keys for Ansible access
    - name: Set up SSH Private Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/gitops-deployer-key.pem
        chmod 600 ~/.ssh/gitops-deployer-key.pem

    # 3. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    # 4. Terraform Format check
    - name: Terraform Format Check
      run: terraform fmt -check
      working-directory: ./terraform

    # 5. Terraform Init
    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform

    # 6. Terraform Plan
    - name: Terraform Plan
      run: terraform plan -out=tfplan
      working-directory: ./terraform

    # 7. Terraform Apply (on push to main branch only)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        terraform apply -auto-approve tfplan
        # Export the EC2 public IP to be used by Ansible
        echo "INSTANCE_IP=$(terraform output -raw instance_public_ip)" >> $GITHUB_ENV
      working-directory: ./terraform

    # 8. Setup Python for Ansible
    - name: Set up Python
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 9. Install Ansible
    - name: Install Ansible
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        python -m pip install --upgrade pip
        pip install ansible

    # 10. Update Ansible Inventory with provisioned EC2 IP
    - name: Update Inventory IP
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        sed -i "s/nginx_server ansible_host=127.0.0.1/nginx_server ansible_host=${{ env.INSTANCE_IP }}/g" ansible/inventory.ini

    # 11. Wait for SSH server to become available
    - name: Wait for SSH
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "Waiting for SSH connection to become active..."
        until nc -z -v -w30 ${{ env.INSTANCE_IP }} 22; do
          echo "Waiting for port 22..."
          sleep 5
        done

    # 12. Run Ansible Playbook to configure Nginx and deploy custom HTML portal
    - name: Run Ansible Playbook
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        ansible-playbook -i inventory.ini playbook.yml
      working-directory: ./ansible
      env:
        ANSIBLE_HOST_KEY_CHECKING: 'False'
